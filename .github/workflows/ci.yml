name: CI
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * *" # daily extended fuzz
  workflow_dispatch:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
jobs:
  check:
    name: build · test · fmt · clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt, clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace
      - run: cargo test --workspace
      - run: rustup target add x86_64-pc-windows-gnu
      - run: cargo check --workspace --all-targets --target x86_64-pc-windows-gnu
      - run: cargo clippy --workspace --all-targets --target x86_64-pc-windows-gnu -- -D warnings
  cross-os:
    name: build · test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true # TODO: drop once green to make parity gating (the windows guard is unverified)
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
      - run: cargo test --workspace
  fuzz:
    name: cargo-fuzz (escape-TCB targets)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [decode_verify, diff, mask]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: fuzz }
      - run: cargo install cargo-fuzz --locked
      - run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=300 -rss_limit_mb=4096
  bench:
    # Non-gating perf signal (DESIGN §1a). Wall-clock on shared runners is noisy and the
    # committed `bench/baseline.txt` records *another* machine's ratios, so this never blocks a
    # merge (`continue-on-error`) and runs only nightly / on demand. A wide `--tol` (40%) means
    # only a gross regression — e.g. SSA promotion or mask-elision silently dropping, which is
    # multiples, not percent — trips it; small cross-machine drift is ignored. (The *exact*
    # promotion guard is the deterministic `c_frontend` memory-op test in the gating job.)
    name: bench regression check (non-gating)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: bench }
      # `cargo run` builds the chibicc fork itself (for the `alu_c` kernel); make + cc are
      # preinstalled on ubuntu-latest. If the frontend can't build, that kernel is skipped.
      - name: bench --check vs committed baseline
        working-directory: bench
        run: cargo run --release -- --check baseline.txt --tol 0.4
