name: CI
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * *" # daily extended fuzz
  workflow_dispatch:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
jobs:

  check:
    name: build · test · fmt · clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with: { components: rustfmt, clippy }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace
      - run: cargo test --workspace
      - run: rustup target add x86_64-pc-windows-gnu
      # The §5 W3 trap-capture C shim (trap_capture.c) is compiled for windows targets too, so the
      # windows-gnu cross-check needs the mingw cross-compiler. (The MSVC build runs on windows-latest.)
      - run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64
      - run: cargo check --workspace --all-targets --target x86_64-pc-windows-gnu
      - run: cargo clippy --workspace --all-targets --target x86_64-pc-windows-gnu -- -D warnings

  cross-os:
    name: build · test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # continue-on-error: true # TODO: drop once green to make parity gating (the windows guard is unverified)
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build --workspace
      - run: cargo test --workspace

  fuzz:
    name: cargo-fuzz (escape-TCB targets)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [decode_verify, diff, mask, wasm_transpile]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with: { workspaces: fuzz }
      - run: cargo install cargo-fuzz --locked
      - run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=300 -rss_limit_mb=4096

  bench:
    # Non-gating perf signal (DESIGN §1a). Wall-clock on shared runners is noisy and the
    # committed `bench/baseline.txt` records *another* machine's ratios, so this never blocks a
    # merge (`continue-on-error`) and runs only nightly / on demand. A wide `--tol` (40%) means
    # only a gross regression — e.g. SSA promotion or mask-elision silently dropping, which is
    # multiples, not percent — trips it; small cross-machine drift is ignored. (The *exact*
    # promotion guard is the deterministic `c_frontend` memory-op test in the gating job.)
    name: bench regression check (non-gating)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with: { workspaces: bench }
      # `cargo run` builds the chibicc fork itself (for the `alu_c` kernel); make + cc are
      # preinstalled on ubuntu-latest. If the frontend can't build, that kernel is skipped.
      - name: bench --check vs committed baseline
        working-directory: bench
        run: cargo run --release -- --check baseline.txt --tol 0.4

  loom:
    name: loom (parallel scheduler model check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: loom model check
        run: cargo test -p svm-jit --lib loom
        env:
          RUSTFLAGS: "--cfg loom"

  svm-llvm:
    name: svm-llvm (LLVM→IR on-ramp · Linux-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with: { components: rustfmt, clippy }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with: { workspaces: crates/svm-llvm }
      - name: install LLVM 18 (dev headers + dynamic lib)
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18-dev clang-18
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"
      - name: install Rust 1.81 (LLVM 18) for the Rust on-ramp lane
        # `rustc +1.81.0` emits LLVM-18 bitcode the pinned `llvm-ir` reader accepts (the default
        # stable toolchain bundles a newer LLVM, which the reader rejects). Without this the Rust
        # breadth test (`rust_no_std_matches_native`) skips; with it, it runs vs native `rustc`.
        run: rustup toolchain install 1.81.0 --profile minimal
      - name: fmt · clippy · test
        working-directory: crates/svm-llvm
        run: |
          cargo fmt --all --check
          cargo clippy --all-targets -- -D warnings
          cargo test

  miri:
    # Run the unsafe memory substrate under Miri's UB/provenance + data-race checkers. svm-mem is
    # Miri-aware (a heap-backed fallback replaces the mmap FFI under `cfg(miri)`), so its raw-pointer
    # atomics and the Mapped-vs-Paged differential get provenance/race-checked — complementing loom
    # (which models the protocol atomics) and TSan.
    name: miri (svm-mem unsafe substrate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with: { components: miri }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo +nightly miri test -p svm-mem
        env:
          # Miri's weak-memory emulation ICEs on the differential test's mixed-size atomic accesses
          # ("partially overlapping store buffer when previous write was atomic" — a Miri bug, not ours).
          # Disabling it keeps full UB / provenance / data-race / alignment checking.
          MIRIFLAGS: "-Zmiri-disable-weak-memory-emulation"

  supply-chain:
    # Scan the dependency tree against the RustSec advisory DB. Gated off pull_request so a
    # newly-published advisory on a transitive dep surfaces on main / nightly without blocking
    # unrelated feature PRs (same posture as the fuzz/bench jobs).
    name: cargo-audit (advisory scan)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  asan:
    # AddressSanitizer over the fiber stack-switch paths. svm-fiber's `asan` feature emits the
    # __sanitizer_{start,finish}_switch_fiber annotations so ASan can follow manual stack switches.
    name: ASan (svm-fiber switches)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with: { components: rust-src }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo test -p svm-fiber (ASan + asan feature)
        run: cargo test -p svm-fiber --features asan -Z build-std --target x86_64-unknown-linux-gnu
        env:
          RUSTFLAGS: "-Zsanitizer=address"
          # The scheduler intentionally leaks values live on a dropped-suspended fiber's stack
          # (documented), so leak detection would false-positive — keep it to UB/races here.
          ASAN_OPTIONS: "detect_leaks=0"

  tsan:
    # ThreadSanitizer over the shared-region hardware atomics (svm-mem's parallel vCPU substrate).
    name: TSan (svm-mem concurrency)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with: { components: rust-src }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo test -p svm-mem (TSan)
        run: cargo test -p svm-mem -Z build-std --target x86_64-unknown-linux-gnu
        env:
          RUSTFLAGS: "-Zsanitizer=thread"

  wasm32-differential:
    name: wasm32 differential (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with: { workspaces: browser }
      - run: rustup target add wasm32-unknown-unknown
      # gencorpus (native) writes corpus.json + corpus/*.svmbc; build the wasm32 lib; diff in Node
      # (Node is preinstalled on ubuntu-latest — corpus.mjs needs only WebAssembly + BigInt).
      - name: wasm32 corpus differential (119/119 vs native)
        working-directory: browser
        run: |
          cargo run --bin gencorpus
          cargo build --release --lib --target wasm32-unknown-unknown
          node corpus.mjs target/wasm32-unknown-unknown/release/svm_browser.wasm

  wasm64-differential:
    name: wasm64 differential (Wasmtime embedding)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "" # override the global -D warnings: -Z build-std recompiles std from source
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with: { components: rust-src }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            browser
            browser/wt
      - name: wasm64 corpus differential (119/119 vs native)
        working-directory: browser
        run: |
          cargo run --bin gencorpus
          cargo build -Z build-std=std,panic_abort --release --lib \
            --target wasm64-unknown-unknown
          cargo run --manifest-path wt/Cargo.toml --release -- \
            target/wasm64-unknown-unknown/release/svm_browser.wasm

  asan-jit-setjmp:
    # AddressSanitizer over the JIT setjmp/longjmp path (Option B: libc _setjmp/_longjmp called
    # inline from JITted code — memory-unsafe native-stack manipulation, so it gets svm-fiber-grade
    # rigor, LLVM.md §"JIT longjmp"). Runs the on-ramp setjmp differential (all engines incl. the
    # live JIT == native) under ASan. The baked _setjmp/_longjmp addresses resolve to ASan's
    # interceptors, which unpoison the stack on the non-local jump — so a returns-twice mishandle
    # surfaces here as a red-zone/use-after-return report rather than silent corruption.
    name: ASan (JIT setjmp/longjmp)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with: { components: rust-src }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: install LLVM 18 (dev headers + dynamic lib)
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18-dev clang-18
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"
      - name: cargo test -p svm-llvm setjmp (ASan, JIT path live)
        run: cargo test -p svm-llvm -Z build-std --target x86_64-unknown-linux-gnu setjmp
        env:
          # -Zsanitizer=address replaces the workflow-global `-D warnings`: -Z build-std recompiles
          # std from source, which would trip warnings-as-errors (same reason the wasm64 lane clears it).
          RUSTFLAGS: "-Zsanitizer=address"
          # The fiber scheduler intentionally leaks values on a dropped-suspended fiber's stack, so
          # keep leak detection off and check UB/use-after-return/red-zones only (matches the asan lane).
          ASAN_OPTIONS: "detect_leaks=0"
