<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SVM in the browser — real-Worker validation</title>
  </head>
  <body>
    <h1>SVM in the browser</h1>
    <!-- Playwright reads the `data-status` / `data-result` attributes; humans read the log. -->
    <p id="isolated" data-status="pending">crossOriginIsolated: ?</p>
    <p id="powerbox" data-status="pending">powerbox: pending</p>
    <p id="threads" data-status="pending">threads: pending</p>
    <p id="jit" data-status="pending">jit: pending</p>
    <p id="inst" data-status="pending">inst: pending</p>
    <p id="capio" data-status="pending">capio: pending</p>
    <p id="wasmjit" data-status="pending">wasmjit: pending</p>
    <p id="tierup" data-status="pending">tierup: pending</p>
    <p id="jitcodegen" data-status="pending">jitcodegen: pending</p>
    <p id="instcodegen" data-status="pending">instcodegen: pending</p>
    <pre id="log"></pre>
    <script type="module" src="/web/main.js"></script>
  </body>
</html>
