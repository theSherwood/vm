<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Re-adds COOP/COEP on static hosts (GitHub Pages) so the page is cross-origin isolated and
         SharedArrayBuffer is available. Must run before the module scripts. No-op locally (serve.mjs
         already sets the headers). Sibling to this file, so its SW scope covers everything under web/;
         the same-origin wasm under target/ loads without CORP (COEP exempts same-origin). -->
    <script src="coi-serviceworker.js"></script>
    <title>SVM playground</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 1.5rem; max-width: 72rem; }
      h1 { font-size: 1.3rem; }
      .controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin: 0.75rem 0; }
      .panes { display: flex; gap: 1rem; align-items: stretch; flex-wrap: wrap; }
      .pane { flex: 1 1 26rem; display: flex; flex-direction: column; gap: 0.5rem; min-width: 0; }
      textarea { width: 100%; height: 30rem; font: 0.85rem/1.35 ui-monospace, monospace;
                 white-space: pre; box-sizing: border-box; }
      pre { background: #f4f4f4; padding: 0.5rem; margin: 0; overflow: auto; min-height: 1.2rem; }
      #stdout { min-height: 6rem; max-height: 14rem; }
      /* The framebuffer pane (the `display` capability): crisp upscaling of small guest frames,
         hidden until a guest presents one. */
      #canvas { display: none; image-rendering: pixelated; width: 100%; max-width: 24rem;
                height: auto; background: #000; border: 1px solid #ccc; }
      #desc { color: #555; font-size: 0.9rem; margin: 0; }
      #state[data-state="error"] { color: #b00020; }
      #state[data-state="done"] { color: #1a7f37; }
      button { padding: 0.3rem 1rem; }
      @media (prefers-color-scheme: dark) {
        body { background: #111; color: #ddd; }
        pre { background: #1d1d1d; }
        #desc { color: #999; }
        textarea { background: #1d1d1d; color: #ddd; }
      }
    </style>

    <!-- Editor: CodeMirror 5, vendored under vendor/codemirror/ (UI only — never touches the sandbox
         or any authority). Loaded as classic scripts so window.CodeMirror is populated before the
         deferred play.js module runs. Order: core, then the simple-mode + edit addons, then the
         dialog/search addons Vim needs, then the Vim keymap and language modes. -->
    <link rel="stylesheet" href="vendor/codemirror/codemirror.css" />
    <link rel="stylesheet" href="vendor/codemirror/addon/dialog.css" />
    <style>
      .CodeMirror {
        height: 30rem; border: 1px solid #ccc; border-radius: 4px;
        font: 0.85rem/1.4 ui-monospace, monospace;
      }
      .CodeMirror.cm-readonly { opacity: 0.82; }
      .CodeMirror.cm-readonly .CodeMirror-cursor { display: none; }
      /* Parse/verify error decoration: a gutter dot, a highlighted line, and an inline message. */
      .svm-error-gutter { width: 0.8rem; }
      .cm-error-marker { color: #d1242f; cursor: help; }
      .cm-error-line { background: #fbe9eb; }
      .cm-error-widget {
        background: #ffeef0; color: #86181d; border-left: 3px solid #d1242f;
        font: 0.78rem/1.4 ui-monospace, monospace; padding: 0.2rem 0.5rem; white-space: pre-wrap;
      }
      /* Light-theme token colors (a GitHub-flavored palette). */
      .cm-s-default .cm-comment { color: #6a737d; font-style: italic; }
      .cm-s-default .cm-string { color: #a31515; }
      .cm-s-default .cm-keyword { color: #0b5fa5; font-weight: 600; }
      .cm-s-default .cm-builtin { color: #8250df; }
      .cm-s-default .cm-type { color: #067d6f; }
      .cm-s-default .cm-def { color: #953800; font-weight: 600; }
      .cm-s-default .cm-variable-2 { color: #0550ae; }
      .cm-s-default .cm-number { color: #1a7f37; }
      .cm-s-default .cm-operator { color: #6a737d; }
      @media (prefers-color-scheme: dark) {
        .CodeMirror {
          border-color: #333; background: #1d1d1d; color: #ddd;
        }
        .CodeMirror-gutters { background: #1a1a1a; border-color: #333; }
        .CodeMirror-linenumber { color: #666; }
        .CodeMirror-cursor { border-left-color: #ddd; }
        .CodeMirror-selected { background: #33415580 !important; }
        .cm-s-default .cm-comment { color: #8b949e; }
        .cm-s-default .cm-string { color: #ff7b72; }
        .cm-s-default .cm-keyword { color: #79c0ff; }
        .cm-s-default .cm-builtin { color: #d2a8ff; }
        .cm-s-default .cm-type { color: #56d4c4; }
        .cm-s-default .cm-def { color: #ffa657; }
        .cm-s-default .cm-variable-2 { color: #a5d6ff; }
        .cm-s-default .cm-number { color: #7ee787; }
        .cm-s-default .cm-operator { color: #8b949e; }
        .CodeMirror-dialog { background: #1d1d1d; color: #ddd; }
        .cm-error-line { background: #3a1d20; }
        .cm-error-marker { color: #ff7b72; }
        .cm-error-widget { background: #2d1417; color: #ffb4ac; border-left-color: #f85149; }
      }
    </style>
    <script src="vendor/codemirror/codemirror.js"></script>
    <script src="vendor/codemirror/addon/simple.js"></script>
    <script src="vendor/codemirror/addon/matchbrackets.js"></script>
    <script src="vendor/codemirror/addon/dialog.js"></script>
    <script src="vendor/codemirror/addon/searchcursor.js"></script>
    <script src="vendor/codemirror/vim.js"></script>
    <script src="vendor/codemirror/mode/lua.js"></script>
    <script src="vendor/codemirror/mode/sql.js"></script>
    <script src="vendor/codemirror/mode/clike.js"></script>
  </head>
  <body>
    <h1>SVM playground — SVM text across real Web Workers, and real C/C++ guests via the LLVM on-ramp</h1>
    <p id="desc"></p>
    <div class="controls">
      <label>example
        <select id="example"></select>
      </label>
      <label>powerbox
        <select id="mode">
          <option value="plain">none (compute only)</option>
          <option value="io">host I/O (stdout)</option>
          <option value="jit">guest JIT (§22)</option>
          <option value="inst">instantiator (§14)</option>
        </select>
      </label>
      <button id="run" disabled>Run</button>
      <button id="stop" disabled>Stop</button>
      <label id="jitLabel" title="Run the reactor's tick() on emitted wasm (wasm-JIT tier) instead of the interpreter — smooths DOOM's frame rate" hidden>
        <input type="checkbox" id="jit" checked> wasm-JIT
      </label>
      <label title="Vim keybindings in the editor">
        <input type="checkbox" id="vim"> vim
      </label>
      <span id="state" data-state="loading">loading engine…</span>
    </div>
    <div class="panes">
      <div class="pane">
        <textarea id="src" spellcheck="false" autocomplete="off"></textarea>
      </div>
      <div class="pane">
        <strong>result</strong>
        <pre id="result"></pre>
        <canvas id="canvas" width="1" height="1"></canvas>
        <!-- A separate canvas for the WebGPU (`webgpu` capability) demos: a canvas is bound to one
             context type for its lifetime, so GPU demos can't share the 2D `#canvas` the display
             (framebuffer) demos use. Hidden until a GPU demo runs. -->
        <canvas id="gpucanvas" style="display:none; image-rendering:auto; width:100%; max-width:40rem;
                height:auto; background:#000; border:1px solid #ccc;"></canvas>
        <strong>stdout</strong>
        <pre id="stdout"></pre>
        <strong>log</strong>
        <pre id="log"></pre>
      </div>
    </div>
    <script type="module" src="play.js"></script>
  </body>
</html>
