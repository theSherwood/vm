<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Re-adds COOP/COEP on static hosts (GitHub Pages) so the page is cross-origin isolated and
         SharedArrayBuffer is available. Must run before the module scripts. No-op locally (serve.mjs
         already sets the headers). Sibling to this file, so its SW scope covers everything under web/;
         the same-origin wasm under target/ loads without CORP (COEP exempts same-origin). -->
    <script src="coi-serviceworker.js"></script>
    <title>SVM playground</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 1.5rem; max-width: 72rem; }
      h1 { font-size: 1.3rem; }
      .controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin: 0.75rem 0; }
      .panes { display: flex; gap: 1rem; align-items: stretch; flex-wrap: wrap; }
      .pane { flex: 1 1 26rem; display: flex; flex-direction: column; gap: 0.5rem; min-width: 0; }
      textarea { width: 100%; height: 30rem; font: 0.85rem/1.35 ui-monospace, monospace;
                 white-space: pre; box-sizing: border-box; }
      pre { background: #f4f4f4; padding: 0.5rem; margin: 0; overflow: auto; min-height: 1.2rem; }
      #stdout { min-height: 6rem; max-height: 14rem; }
      #desc { color: #555; font-size: 0.9rem; margin: 0; }
      #state[data-state="error"] { color: #b00020; }
      #state[data-state="done"] { color: #1a7f37; }
      button { padding: 0.3rem 1rem; }
      @media (prefers-color-scheme: dark) {
        body { background: #111; color: #ddd; }
        pre { background: #1d1d1d; }
        #desc { color: #999; }
        textarea { background: #1d1d1d; color: #ddd; }
      }
    </style>
  </head>
  <body>
    <h1>SVM playground — SVM text across real Web Workers, and real C/C++ guests via the LLVM on-ramp</h1>
    <p id="desc"></p>
    <div class="controls">
      <label>example
        <select id="example"></select>
      </label>
      <label>powerbox
        <select id="mode">
          <option value="plain">none (compute only)</option>
          <option value="io">host I/O (stdout)</option>
          <option value="jit">guest JIT (§22)</option>
          <option value="inst">instantiator (§14)</option>
        </select>
      </label>
      <button id="run" disabled>Run</button>
      <button id="stop" disabled>Stop</button>
      <span id="state" data-state="loading">loading engine…</span>
    </div>
    <div class="panes">
      <div class="pane">
        <textarea id="src" spellcheck="false" autocomplete="off"></textarea>
      </div>
      <div class="pane">
        <strong>result</strong>
        <pre id="result"></pre>
        <strong>stdout</strong>
        <pre id="stdout"></pre>
        <strong>log</strong>
        <pre id="log"></pre>
      </div>
    </div>
    <script type="module" src="play.js"></script>
  </body>
</html>
