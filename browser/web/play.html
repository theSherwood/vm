<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Re-adds COOP/COEP on static hosts (GitHub Pages) so the page is cross-origin isolated and
         SharedArrayBuffer is available. Must run before the module scripts. No-op locally (serve.mjs
         already sets the headers). Sibling to this file, so its SW scope covers everything under web/;
         the same-origin wasm under target/ loads without CORP (COEP exempts same-origin). -->
    <script src="coi-serviceworker.js"></script>
    <title>SVM playground</title>
    <style>
      :root {
        --bg: #ffffff; --fg: #1a1d21; --muted: #5c6673; --faint: #8a94a3;
        --border: #e2e6ec; --surface: #f7f8fa; --accent: #2f57d6; --accent-soft: #eef1fb;
        --good: #1a7f37; --bad: #b00020;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111417; --fg: #dfe3e8; --muted: #9aa4b2; --faint: #6f7a89;
          --border: #262c34; --surface: #1a1e23; --accent: #7c8cff; --accent-soft: #1b2340;
          --good: #4cc585; --bad: #ff6b81;
        }
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
             background: var(--bg); color: var(--fg); line-height: 1.5; }
      header.top { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); }
      header.top h1 { font-size: 1.05rem; margin: 0; font-weight: 650; letter-spacing: -0.01em; }
      header.top p { margin: 0.25rem 0 0; color: var(--muted); font-size: 0.85rem; }

      .layout { display: flex; align-items: flex-start; gap: 1.5rem; max-width: 78rem; margin: 0 auto;
                padding: 1.25rem 1.5rem 4rem; }
      .sidebar { position: sticky; top: 1rem; flex: 0 0 15rem; align-self: flex-start;
                 max-height: calc(100vh - 2rem); overflow-y: auto; }
      #engine-state { font-size: 0.8rem; color: var(--muted); padding: 0.35rem 0.6rem; margin-bottom: 0.5rem;
                      border: 1px solid var(--border); border-radius: 8px; background: var(--surface); }
      #engine-state[data-state="error"] { color: var(--bad); }
      #engine-state[data-state="ready"] { color: var(--good); }
      #nav-list { display: flex; flex-direction: column; }
      .nav-link { display: block; padding: 0.32rem 0.6rem; border-radius: 7px; color: var(--muted);
                  text-decoration: none; font-size: 0.85rem; border-left: 2px solid transparent; }
      .nav-link:hover { background: var(--surface); color: var(--fg); }
      .nav-link.active { color: var(--accent); background: var(--accent-soft); border-left-color: var(--accent);
                         font-weight: 600; }
      .vim-toggle { margin-top: 0.75rem; padding: 0.4rem 0.6rem; font-size: 0.82rem; color: var(--muted);
                    display: flex; align-items: center; gap: 0.4rem; }

      main#demos { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 1.5rem; }
      .demo { border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.25rem;
              background: var(--surface); scroll-margin-top: 1rem; }
      .demo-title { font-size: 1.05rem; margin: 0 0 0.3rem; font-weight: 620; letter-spacing: -0.01em; }
      .desc { color: var(--muted); font-size: 0.86rem; margin: 0 0 0.85rem; }
      .editor { margin-bottom: 0.75rem; }
      .note { background: var(--bg); border: 1px dashed var(--border); border-radius: 8px;
              padding: 0.7rem 0.85rem; margin: 0 0 0.75rem; color: var(--muted);
              font: 0.82rem/1.5 ui-monospace, monospace; white-space: pre-wrap; }
      .controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.75rem; }
      .controls label { font-size: 0.82rem; color: var(--muted); display: flex; align-items: center; gap: 0.3rem; }
      .controls select { font-size: 0.82rem; }
      button { padding: 0.3rem 1rem; border: 1px solid var(--border); border-radius: 7px;
               background: var(--bg); color: var(--fg); cursor: pointer; font-size: 0.85rem; }
      button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
      button:disabled { opacity: 0.5; cursor: default; }
      button.run { background: var(--accent); color: #fff; border-color: var(--accent); }
      button.run:hover:not(:disabled) { color: #fff; filter: brightness(1.08); }
      .state { font-size: 0.82rem; color: var(--muted); font-variant-numeric: tabular-nums; }
      .state[data-state="error"], .state[data-state="stopped"] { color: var(--bad); }
      .state[data-state="done"] { color: var(--good); }
      .output { display: grid; gap: 0.3rem; }
      .output strong { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--faint); }
      .output pre { background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
                    padding: 0.45rem 0.6rem; margin: 0; overflow: auto; min-height: 1.2rem;
                    font: 0.8rem/1.4 ui-monospace, monospace; }
      .output .stdout { min-height: 3rem; max-height: 14rem; }
      .output .log { max-height: 8rem; color: var(--muted); }
      .output .log:empty, .output .stdout:empty { display: none; }
      canvas.canvas { image-rendering: pixelated; width: 100%; max-width: 24rem; height: auto;
                      background: #000; border: 1px solid var(--border); border-radius: 6px; }
      canvas.gpucanvas { image-rendering: auto; width: 100%; max-width: 40rem; height: auto;
                         background: #000; border: 1px solid var(--border); border-radius: 6px; }
      @media (max-width: 48rem) {
        .layout { flex-direction: column; }
        .sidebar { position: static; max-height: none; flex-basis: auto; width: 100%; }
        #nav-list { flex-flow: row wrap; }
      }
    </style>

    <!-- Editor: CodeMirror 5, vendored as a single bundle (UI only — never touches the sandbox or any
         authority). One top-level file so the Pages assemble step, which copies web/*.js, deploys it;
         it also injects CodeMirror's own CSS. Loaded as a classic script so window.CodeMirror is
         populated before the deferred play.js module runs. See build-codemirror-bundle.sh. -->
    <script src="codemirror.bundle.js"></script>
    <style>
      .CodeMirror {
        height: 18rem; border: 1px solid var(--border); border-radius: 6px;
        font: 0.85rem/1.4 ui-monospace, monospace;
      }
      .CodeMirror.cm-readonly { opacity: 0.82; }
      .CodeMirror.cm-readonly .CodeMirror-cursor { display: none; }
      /* Parse/verify error decoration: a gutter dot, a highlighted line, and an inline message. */
      .svm-error-gutter { width: 0.8rem; }
      .cm-error-marker { color: #d1242f; cursor: help; }
      .cm-error-line { background: #fbe9eb; }
      .cm-error-widget {
        background: #ffeef0; color: #86181d; border-left: 3px solid #d1242f;
        font: 0.78rem/1.4 ui-monospace, monospace; padding: 0.2rem 0.5rem; white-space: pre-wrap;
      }
      /* Light-theme token colors (a GitHub-flavored palette). */
      .cm-s-default .cm-comment { color: #6a737d; font-style: italic; }
      .cm-s-default .cm-string { color: #a31515; }
      .cm-s-default .cm-keyword { color: #0b5fa5; font-weight: 600; }
      .cm-s-default .cm-builtin { color: #8250df; }
      .cm-s-default .cm-type { color: #067d6f; }
      .cm-s-default .cm-def { color: #953800; font-weight: 600; }
      .cm-s-default .cm-variable-2 { color: #0550ae; }
      .cm-s-default .cm-number { color: #1a7f37; }
      .cm-s-default .cm-operator { color: #6a737d; }
      @media (prefers-color-scheme: dark) {
        .CodeMirror {
          border-color: #333; background: #1d1d1d; color: #ddd;
        }
        .CodeMirror-gutters { background: #1a1a1a; border-color: #333; }
        .CodeMirror-linenumber { color: #666; }
        .CodeMirror-cursor { border-left-color: #ddd; }
        .CodeMirror-selected { background: #33415580 !important; }
        .cm-s-default .cm-comment { color: #8b949e; }
        .cm-s-default .cm-string { color: #ff7b72; }
        .cm-s-default .cm-keyword { color: #79c0ff; }
        .cm-s-default .cm-builtin { color: #d2a8ff; }
        .cm-s-default .cm-type { color: #56d4c4; }
        .cm-s-default .cm-def { color: #ffa657; }
        .cm-s-default .cm-variable-2 { color: #a5d6ff; }
        .cm-s-default .cm-number { color: #7ee787; }
        .cm-s-default .cm-operator { color: #8b949e; }
        .CodeMirror-dialog { background: #1d1d1d; color: #ddd; }
        .cm-error-line { background: #3a1d20; }
        .cm-error-marker { color: #ff7b72; }
        .cm-error-widget { background: #2d1417; color: #ffb4ac; border-left-color: #f85149; }
      }
    </style>
  </head>
  <body>
    <header class="top">
      <h1>SVM playground</h1>
      <p>SVM text across real Web Workers, and real C/C++ guests (Lua, SQLite, Postgres, DOOM) via the LLVM on-ramp — all client-side, in the sandbox.</p>
    </header>
    <div class="layout">
      <nav class="sidebar" aria-label="Demos">
        <div id="engine-state" data-state="loading">loading engine…</div>
        <div id="nav-list"></div>
        <label class="vim-toggle" title="Vim keybindings in every editor">
          <input type="checkbox" id="vim"> vim mode
        </label>
      </nav>
      <!-- One <section class="demo"> per example is built here by play.js; each carries its own editor,
           controls, and output panes. -->
      <main id="demos"></main>
    </div>
    <script type="module" src="play.js"></script>
  </body>
</html>
