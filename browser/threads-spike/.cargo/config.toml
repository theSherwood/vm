# The wasm threads build, baked in so `cargo +nightly build --release` just works:
#   * +atomics/+bulk-memory/+mutable-globals — emit wasm atomic ops + a thread-capable layout
#   * --shared-memory + --max-memory       — the linear memory is a SharedArrayBuffer
#   * --import-memory                       — JS owns the single shared memory and hands it to every
#                                             instance (main + each worker), so they share one heap
#   * --no-entry                            — a cdylib, no `_start`
# `+atomics` is ABI-incompatible with the precompiled core, so core must be rebuilt (build-std).
[build]
target = "wasm32-unknown-unknown"
rustflags = [
  "-Ctarget-feature=+atomics,+bulk-memory,+mutable-globals",
  "-Clink-arg=--shared-memory",
  "-Clink-arg=--import-memory",
  "-Clink-arg=--max-memory=1073741824",
  "-Clink-arg=--no-entry",
]

[unstable]
build-std = ["core", "panic_abort", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]
